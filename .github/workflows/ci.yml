name: CI

on:
  push:
    branches: [main, develop, 'deploy-ready-improvements', 'v2-*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Run flake8
        run: flake8 backend/ --max-line-length=120 --extend-ignore=E203,W503,F401,F821,F841,E402

      - name: Check black formatting
        run: black --check backend/ --line-length=120

      - name: Check isort import order
        run: isort --check-only backend/ --line-length=120

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run ESLint
        run: cd frontend && npm run lint

      - name: Run TypeScript type check
        run: cd frontend && npm run type-check || true

  test-backend:
    needs: lint-backend
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      OPENAI_API_KEY: test-key
      MINIMAX_API_KEY: test-key
      APP_API_KEY: ''
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx email-validator

      - name: Run backend tests
        run: pytest backend/tests/ --ignore=backend/tests/integration --cov=backend --cov-report=xml --cov-fail-under=70 -v -k "not TestExecutionStream"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml

  test-frontend:
    needs: lint-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests with coverage
        run: cd frontend && npm run test -- --coverage --watchAll=false --ci

  test-e2e:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install email-validator uvicorn

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Start backend
        run: |
          cd backend
          uvicorn main:app --port 8000 &
          sleep 15
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          OPENAI_API_KEY: test-key
          MINIMAX_API_KEY: test-key

      - name: Build and start frontend
        run: |
          cd frontend
          npm run build
          node .next/standalone/server.js &
          sleep 10
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          PORT: 3000

      - name: Wait for services
        run: npx wait-on http://localhost:3000 http://localhost:8000/health --timeout 60000

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  docker-build:
    needs: [lint-backend, lint-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag samyakjain7/multi-agent-backend:latest \
            --push \
            backend/

      - name: Build frontend Docker image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag samyakjain7/multi-agent-frontend:latest \
            --push \
            frontend/